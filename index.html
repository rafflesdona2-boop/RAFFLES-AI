<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peace Sign Blur Web v5 ✌️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 1.8rem;
            color: #00e676;
        }

        p {
            margin: 0 0 20px 0;
            color: #aaaaaa;
            text-align: center;
        }

        .container {
            position: relative;
            width: 720px;
            height: 405px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #222;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efek mirror */
            transition: filter 0.15s ease;
        }

        .blur-effect {
            filter: blur(30px); /* Efek sensor blur pekat */
        }

        .loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        .error-msg {
            color: #ff5252;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <h1>TREND: Peace Sign Blur! ✌️</h1>
    <p>Tunjukkan peace → layar blur | Lepaskan → layar normal</p>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="loading" class="loading">
            <div id="status-text">Menyiapkan Kamera & Sistem AI...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById("webcam");
        const loadingDiv = document.getElementById("loading");
        const statusText = document.getElementById("status-text");

        // 1. Logika Cek Jari Simbol Peace (Persis Python)
        function isPeaceSign(landmarks) {
            // Sumbu Y terbalik di MediaPipe Web (0 di atas, 1 di bawah)
            const indexUp = landmarks[8].y < landmarks[6].y;
            const middleUp = landmarks[12].y < landmarks[10].y;
            const ringDown = landmarks[16].y > landmarks[14].y;
            const pinkyDown = landmarks[20].y > landmarks[18].y;

            return indexUp && middleUp && ringDown && pinkyDown;
        }

        // 2. Callback Hasil Deteksi AI
        function onResults(results) {
            // Sembunyikan layar loading begitu data frame pertama diproses sukses
            if (loadingDiv.style.display !== 'none') {
                loadingDiv.style.display = 'none';
            }

            let peaceDetected = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    if (isPeaceSign(landmarks)) {
                        peaceDetected = true;
                        break;
                    }
                }
            }

            // Terapkan efek blur via class CSS
            if (peaceDetected) {
                video.classList.add("blur-effect");
            } else {
                video.classList.remove("blur-effect");
            }
        }

        // 3. Inisialisasi Objek Hands
        if (typeof Hands === "undefined" || typeof Camera === "undefined") {
            statusText.innerHTML = `<div class="error-msg">ERROR:</div><div style="margin-top:10px; font-size:0.95rem; color:#eee;">Gagal memuat pustaka MediaPipe dari CDN.<br>Pastikan Anda terhubung ke internet dan tidak diblokir oleh ekstensi AdBlock.</div>`;
        } else {
            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onResults);

            // 4. Mengaktifkan Kamera bawaan MediaPipe
            const camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 720,
                height: 405
            });

            statusText.innerText = "Meminta izin kamera... Harap klik 'Izinkan' (Allow)";

            camera.start().catch(err => {
                console.error(err);
                statusText.innerHTML = `
                    <div class="error-msg">AKSES KAMERA GAGAL:</div>
                    <div style="margin-top:10px; font-size:0.95rem; color:#eee; line-height: 1.5;">
                        1. Pastikan Anda menjalankan file ini via <b>Live Server</b> (bukan double click file HTML langsung).<br>
                        2. Klik ikon gembok di sebelah kiri alamat URL atas browser, ubah izin Kamera menjadi <b>Izinkan (Allow)</b>.<br>
                        3. Pastikan kamera tidak sedang dipakai aplikasi Python Anda sebelumnya atau aplikasi Zoom/OBS.
                    </div>`;
            });
        }
    </script>
</body>
</html>
